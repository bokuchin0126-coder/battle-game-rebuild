<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>再現してみたよ</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="stateScreen">
        <h1>Pokemon Battle</h1>
        <button id="state">スタート！</button>
    </div>
    <div id="gameScreen">
        <div id="playerScreen">
            <h2>プレイヤー</h2>
            <div class="playerLise">
                <h4>Lv. <span id="playerLevel">1</span></h4>
                <p>経験値<span id="exp">0</span></p>
            </div>
            <p>撃破数<span id="defeat">0</span></p>
            <div class="hp-container">
                <div id="player-hp-bar" class="hp-bar"></div>
            </div>
            <p>HP: <span id="playerHP">500</span>/<span id="playerMaxHP">500</span></p>
            <div id="button">
                <div id="attackBox">
                    <button id="attack">攻撃</button>
                    <p>攻撃力<span id="playerAttackValue">60</span></p>
                </div>
                <div id="potionFrame">
                    <button id="potion">ポーション</button>
                    <P>ポーション×<span id="potionStock">0</span></P>
                </div>
                <div id="powerBeansFrame">
                    <button id="powerBeans">力の豆</button>
                    <p>力の豆×<span id="powerBeansStock">0</span></p>
                </div>
            </div>
            <div id="log"></div>
        </div>
        <hr>
        <div id="enemyScreen">
            <h2 id="enemyName"></h2>
            <h4>Lv. <span id="enemyLevel">1</span></h4>
            <p>攻撃力<span id="enemyAttackValue">0</span></p>
            <img id="enemyImg">
            <div class="hp-container">
                <div id="enemy-hp-bar" class="hp-bar"></div>
            </div>
            <p>HP: <span id="enemyHP">0</span>/<span id="enemyMaxHP">0</span></p>
        </div>
    </div>
    <div id="gameOverScreen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; text-align: center; z-index: 9999;">
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">リトライ</button>
    </div>
    <div id="gameClear" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; text-align: center; z-index: 9999;">
        <h2>おめでとう！</h2>
        <h1>GAME CLEAR!</h1>
    </div>
</body>
</html>
