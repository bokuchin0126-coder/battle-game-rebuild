<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>再現してみたよ</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div id="stateScreen">
        <h1>Pokemon Battle</h1>
        <button id="state">スタート！</button>
    </div>
    <div id="gameScreen">
    <h2>プレイヤー</h2>
    <div class="playerLise">
        <h4>Lv. <span id="playerLevel">1</span></h4>
        <p>経験値<span id="exp">0</span></p>
    </div>
    <p>撃破数<span id="defeat">0</span></p>
    <div class="hp-container">
        <div id="player-hp-bar" class="hp-bar"></div>
    </div>
    <p>HP: <span id="playerHP">500</span>/<span id="playerMaxHP">500</span></p>
    <button id="attack">攻撃</button>
    <hr>
    <h2 id="enemyName"></h2>
    <h4>Lv. <span id="enemyLevel">1</span></h4>
    <img id="enemyImg">
    <div class="hp-container">
        <div id="enemy-hp-bar" class="hp-bar"></div>
    </div>
    <p>HP: <span id="enemyHP">10</span>/<span id="enemyMaxHP">10</span></p>
    <div id="log"></div>
    <div id="gameOverScreen" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; text-align: center; z-index: 9999;">
        <h1>GAME OVER</h1>
        <button onclick="location.reload()">リトライ</button>
    </div>
    <div id="gameClear" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; text-align: center; z-index: 9999;">
        <h2>おめでとう！</h2>
        <h1>GAME CLEAR!</h1>
    </div>
    </div>
</body>
</html>
